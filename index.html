<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ดนตรีควบคุมด้วยนิ้วมือ</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; background: #111; color: white; text-align: center; font-family: sans-serif; }
        #canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #ui { position: relative; z-index: 10; padding-top: 20px; }
        .info { background: rgba(0,0,0,0.6); padding: 10px; display: inline-block; border-radius: 10px; }
    </style>
</head>
<body>

<div id="ui">
    <h1>ชูนิ้วเพื่อเล่นดนตรี</h1>
    <div class="info" id="status">กำลังรอตรวจจับมือ...</div>
</div>
<video id="video" style="display:none"></video>
<canvas id="canvas"></canvas>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [261.63, 293.66, 329.63, 349.23, 392.00]; // C, D, E, F, G

    function playNote(freq) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
        osc.stop(audioCtx.currentTime + 0.5);
    }

    let lastFingerCount = -1;

    function onResults(results) {
        const canvasElement = document.getElementById('canvas');
        const ctx = canvasElement.getContext('2d');
        ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const landmarks = results.multiHandLandmarks[0];
            let fingers = 0;
            // ตรวจสอบนิ้ว (นิ้วชี้ถึงนิ้วก้อย โดยเทียบพิกัด Y)
            if (landmarks[8].y < landmarks[6].y) fingers++;
            if (landmarks[12].y < landmarks[10].y) fingers++;
            if (landmarks[16].y < landmarks[14].y) fingers++;
            if (landmarks[20].y < landmarks[18].y) fingers++;

            if (fingers !== lastFingerCount && fingers > 0) {
                document.getElementById('status').innerText = "ตรวจพบ: " + fingers + " นิ้ว";
                playNote(notes[fingers]);
                lastFingerCount = fingers;
            }
        }
    }

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1 });
    hands.onResults(onResults);

    const videoElement = document.getElementById('video');
    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 640, height: 480
    });
    camera.start();
</script>
</body>
</html>
