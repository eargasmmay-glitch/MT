<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Hand Synth A Minor</title>
    <!-- โหลดไลบรารีที่จำเป็น -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); z-index: 1; }
        #controls { position: absolute; z-index: 100; top: 20px; left: 20px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #ff4757; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>

<div id="controls">
    <button id="startBtn">เริ่มเปิดกล้องและดนตรี</button>
</div>

<video id="video" style="display:none"></video>
<canvas id="canvas"></canvas>

<script>
    let audioCtx, arpInterval;
    const aMinorScale = [220.00, 246.94, 261.63, 293.66, 329.63, 349.23, 392.00, 440.00];

    const startBtn = document.getElementById('startBtn');
    startBtn.addEventListener('click', async () => {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        startBtn.style.display = 'none';
        initHands();
    });

    function playSynth(freq, vol) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }

    function initHands() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({ maxNumHands: 2, modelComplexity: 1 });
        hands.onResults((results) => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (results.multiHandLandmarks) {
                let rightHand = null;
                results.multiHandLandmarks.forEach((landmarks, i) => {
                    drawConnectors(ctx, landmarks, HAND_CONNECTIONS, { color: '#00FF00', lineWidth: 5 });
                    drawLandmarks(ctx, landmarks, { color: '#FF0000', lineWidth: 2 });
                    if (results.multiHandedness[i].label === 'Right') rightHand = landmarks;
                });

                if (rightHand) {
                    const speed = 200 + (rightHand[0].x * 600);
                    const noteIndex = Math.floor((1 - rightHand[0].y) * aMinorScale.length);
                    const freq = aMinorScale[Math.max(0, Math.min(noteIndex, aMinorScale.length - 1))];
                    const vol = Math.min(Math.hypot(rightHand[0].x - rightHand[12].x, rightHand[0].y - rightHand[12].y) * 3, 0.5);

                    if (!arpInterval) {
                        arpInterval = setInterval(() => playSynth(freq, vol), speed);
                    }
                } else {
                    clearInterval(arpInterval); arpInterval = null;
                }
            }
        });

        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({ image: video }); },
            width: 640, height: 480
        });
        camera.start();
    }
</script>
</body>
</html>
