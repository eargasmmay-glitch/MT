```html
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Music Controller</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); z-index: 1; }
        .ui { position: relative; z-index: 2; margin-top: 20px; text-align: center; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="ui">
    <h1>Hand Music Controller</h1>
    <p>มือซ้าย: โป้ง(Kick), ชี้(Hi-hat), กลาง(Snare) | มือขวา: เล่นโน้ต</p>
    <div id="status">กำลังเริ่มต้นกล้อง...</div>
</div>

<video id="video" style="display:none"></video>
<canvas id="canvas"></canvas>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'kick') {
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        } else if (type === 'snare') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        } else if (type === 'hihat') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(2000, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
        } else {
            osc.frequency.setValueAtTime(type, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        }
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
    }

    let lastStates = { left: { thumb: false, index: false, middle: false }, right: 0 };
    const canvasElement = document.getElementById('canvas');
    const canvasCtx = canvasElement.getContext('2d');

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

    hands.onResults((results) => {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

        if (results.multiHandLandmarks) {
            for (const landmarks of results.multiHandLandmarks) {
                // วาดโครงสร้างมือบน Canvas
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, { color: '#00FF00', lineWidth: 5 });
                drawLandmarks(canvasCtx, landmarks, { color: '#FF0000', lineWidth: 2 });
            }

            // ตรรกะเสียงตามจำนวนนิ้ว
            results.multiHandLandmarks.forEach((landmarks, index) => {
                const handedness = results.multiHandedness[index].label;
                if (handedness === 'Left') {
                    const thumb = landmarks[4].x > landmarks[3].x;
                    const indexF = landmarks[8].y < landmarks[6].y;
                    const mid = landmarks[12].y < landmarks[10].y;
                    if (thumb && !lastStates.left.thumb) playSound('kick');
                    if (indexF && !lastStates.left.index) playSound('hihat');
                    if (mid && !lastStates.left.middle) playSound('snare');
                    lastStates.left = { thumb, index: indexF, middle: mid };
                } else {
                    let f = 0;
                    if (landmarks[8].y < landmarks[6].y) f++;
                    if (landmarks[12].y < landmarks[10].y) f++;
                    if (landmarks[16].y < landmarks[14].y) f++;
                    if (landmarks[20].y < landmarks[18].y) f++;
                    if (f > 0 && f !== lastStates.right) {
                        playSound(200 + (f * 50));
                        lastStates.right = f;
                    } else if (f === 0) lastStates.right = 0;
                }
            });
            document.getElementById('status').innerText = "กำลังเล่นดนตรี...";
        } else {
            document.getElementById('status').innerText = "กรุณาเอามือเข้ากล้อง";
        }
    });

    const video = document.getElementById('video');
    const camera = new Camera(video, {
        onFrame: async () => { await hands.send({ image: video }); },
        width: 640, height: 480
    });
    camera.start();
</script>
</body>
</html>

```
